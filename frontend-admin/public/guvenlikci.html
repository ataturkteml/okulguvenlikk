<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f172a"/>
  <title>Güvenlikçi Ekranı — OkulGiriş</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --primary: #3b82f6;
    }

    html, body {
      height: 100%; background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text); overflow: hidden;
    }

    #app {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 20px 16px; gap: 16px; overflow-y: auto;
    }

    .top-bar {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between;
    }
    .top-bar h1 { font-size: 18px; font-weight: 900; }
    .top-bar span { font-size: 12px; color: var(--muted); font-weight: 700; }

    /* Kamera */
    .camera-box {
      width: 100%; max-width: 340px;
      aspect-ratio: 1;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 3px var(--primary), 0 8px 32px rgba(0,0,0,0.5);
    }

    #qr-reader { width: 100% !important; height: 100% !important; }
    #qr-reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    #qr-reader img, #qr-reader__dashboard, #qr-reader__status_span { display: none !important; }

    .camera-corners { position: absolute; inset: 0; pointer-events: none; }
    .corner {
      position: absolute; width: 32px; height: 32px;
      border-color: var(--primary); border-style: solid; border-width: 0;
    }
    .corner.tl { top: 12px; left: 12px; border-top-width: 4px; border-left-width: 4px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 12px; right: 12px; border-top-width: 4px; border-right-width: 4px; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 12px; left: 12px; border-bottom-width: 4px; border-left-width: 4px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 12px; right: 12px; border-bottom-width: 4px; border-right-width: 4px; border-radius: 0 0 4px 0; }

    .laser {
      position: absolute; left: 12px; right: 12px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), #93c5fd, var(--primary), transparent);
      box-shadow: 0 0 10px rgba(59,130,246,0.8);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan {
      0% { top: 12px; } 50% { top: calc(100% - 14px); } 100% { top: 12px; }
    }

    .camera-status {
      position: absolute; bottom: 12px; left: 0; right: 0;
      text-align: center; font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    /* Sonuç kartı */
    .result-card {
      width: 100%; max-width: 340px;
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      border: 2px solid var(--border);
      transition: all 0.3s;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .result-card.giris { border-color: var(--success); background: rgba(16,185,129,0.08); }
    .result-card.cikis { border-color: var(--danger); background: rgba(239,68,68,0.08); }
    .result-card.hata { border-color: var(--danger); background: rgba(239,68,68,0.08); }

    .result-icon { font-size: 48px; margin-bottom: 12px; }

    .result-islem {
      font-size: 15px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 16px;
    }
    .result-islem.giris { color: var(--success); }
    .result-islem.cikis { color: var(--danger); }
    .result-islem.hata { color: var(--danger); }

    .result-name {
      font-size: 26px; font-weight: 900; margin-bottom: 6px;
      color: var(--text);
    }

    .result-info {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin-top: 4px;
    }

    .info-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .info-chip svg { flex-shrink: 0; }

    .result-saat {
      margin-top: 14px; font-size: 12px;
      color: var(--muted); font-weight: 700;
    }

    .waiting-text {
      font-size: 14px; color: var(--muted);
      font-weight: 700; line-height: 1.6;
    }

    /* Son işlemler */
    .recent-title {
      width: 100%; max-width: 340px;
      font-size: 12px; font-weight: 800;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .recent-list {
      width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .recent-item {
      background: var(--card);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
      border: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

    .recent-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .recent-dot.giris { background: var(--success); }
    .recent-dot.cikis { background: var(--danger); }

    .recent-info { flex: 1; min-width: 0; }
    .recent-info strong { font-size: 13px; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-info span { font-size: 11px; color: var(--muted); font-weight: 600; }

    .recent-time { font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; }

    /* Hata durumu */
    .camera-error {
      width: 100%; max-width: 340px;
      background: rgba(239,68,68,0.1);
      border: 2px solid var(--danger);
      border-radius: 16px; padding: 20px;
      text-align: center;
    }
    .camera-error p { font-size: 13px; line-height: 1.6; color: #fca5a5; font-weight: 600; }
  </style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <h1>🔐 Güvenlikçi Ekranı</h1>
    <span id="clock">--:--</span>
  </div>

  <!-- Kamera -->
  <div class="camera-box" id="camera-box">
    <div id="qr-reader"></div>
    <div class="camera-corners">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="laser"></div>
    </div>
    <div class="camera-status" id="camera-status">Kamera başlatılıyor...</div>
  </div>

  <!-- Sonuç -->
  <div class="result-card" id="result-card">
    <div class="waiting-text">📷 Öğrencinin kartını<br/>kameraya okutun</div>
  </div>

  <!-- Son işlemler -->
  <div class="recent-title">Son İşlemler</div>
  <div class="recent-list" id="recent-list">
    <div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;font-weight:600">Henüz işlem yok</div>
  </div>
</div>

<script>
let qrScanner = null;
let scanning = false;
let recentItems = [];

// Saat
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Kamera başlat
function startScanner() {
  qrScanner = new Html5Qrcode('qr-reader');
  qrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
    onScanSuccess,
    () => {}
  ).then(() => {
    document.getElementById('camera-status').textContent = '✅ Kamera hazır — Kart okutun';
  }).catch(err => {
    document.getElementById('camera-box').innerHTML = `
      <div class="camera-error" style="margin:20px">
        <div style="font-size:36px;margin-bottom:10px">📵</div>
        <p>Kamera erişimi sağlanamadı.<br/>Bu sayfa HTTPS üzerinden açılmalıdır.<br/><br/>
        Yerel test için: <strong>localhost</strong> kullanın.</p>
      </div>`;
  });
}

async function onScanSuccess(barkod) {
  if (scanning) return;
  scanning = true;
  document.getElementById('camera-status').textContent = '⏳ İşleniyor...';

  try {
    const res = await fetch('/api/admin/guvenlikci-oku', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ barkod_veri: barkod })
    });
    const data = await res.json();

    if (data.success) {
      showResult(data);
      addRecent(data);
    } else {
      showError(data.message);
    }
  } catch(e) {
    showError('Sunucu bağlantı hatası!');
  } finally {
    document.getElementById('camera-status').textContent = '✅ Kamera hazır — Kart okutun';
    setTimeout(() => { scanning = false; }, 2500);
  }
}

function showResult(data) {
  const card = document.getElementById('result-card');
  const isGiris = data.islem_turu === 'GİRİŞ';
  const o = data.ogrenci;

  card.className = `result-card ${isGiris ? 'giris' : 'cikis'}`;
  card.innerHTML = `
    <div class="result-icon">${isGiris ? '✅' : '🔴'}</div>
    <div class="result-islem ${isGiris ? 'giris' : 'cikis'}">${isGiris ? '✅ Okula Giriş' : '🔴 Okuldan Çıkış'}</div>
    <div class="result-name">${escHtml(o.ad_soyad)}</div>
    <div class="result-info">
      <div class="info-chip">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/>
        </svg>
        ${escHtml(o.ogrenci_no)}
      </div>
      ${o.sinif ? `<div class="info-chip">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
        </svg>
        ${escHtml(o.sinif)}
      </div>` : ''}
    </div>
    <div class="result-saat">${formatTime(data.saat)}</div>
  `;

  // 4 saniye sonra bekleme ekranına dön
  setTimeout(() => {
    card.className = 'result-card';
    card.innerHTML = '<div class="waiting-text">📷 Öğrencinin kartını<br/>kameraya okutun</div>';
  }, 4000);
}

function showError(msg) {
  const card = document.getElementById('result-card');
  card.className = 'result-card hata';
  card.innerHTML = `
    <div class="result-icon">❌</div>
    <div class="result-islem hata">Hata</div>
    <div style="font-size:14px;color:#fca5a5;font-weight:700">${escHtml(msg)}</div>
  `;
  setTimeout(() => {
    card.className = 'result-card';
    card.innerHTML = '<div class="waiting-text">📷 Öğrencinin kartını<br/>kameraya okutun</div>';
  }, 3000);
}

function addRecent(data) {
  const isGiris = data.islem_turu === 'GİRİŞ';
  const o = data.ogrenci;
  recentItems.unshift({ isGiris, ad_soyad: o.ad_soyad, ogrenci_no: o.ogrenci_no, sinif: o.sinif, saat: data.saat });
  if (recentItems.length > 8) recentItems.pop();
  renderRecent();
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  if (!recentItems.length) {
    list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;font-weight:600">Henüz işlem yok</div>';
    return;
  }
  list.innerHTML = recentItems.map(item => `
    <div class="recent-item">
      <div class="recent-dot ${item.isGiris ? 'giris' : 'cikis'}"></div>
      <div class="recent-info">
        <strong>${escHtml(item.ad_soyad)}</strong>
        <span>${escHtml(item.ogrenci_no)}${item.sinif ? ' • ' + escHtml(item.sinif) : ''} • ${item.isGiris ? 'Giriş' : 'Çıkış'}</span>
      </div>
      <div class="recent-time">${formatTime(item.saat)}</div>
    </div>
  `).join('');
}

function formatTime(str) {
  if (!str) return new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const d = new Date(str.replace ? str.replace(' ', 'T') : str);
  return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Başlat
window.addEventListener('load', startScanner);
</script>
</body>
</html>
