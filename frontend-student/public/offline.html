<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Çevrimdışı - OkulGiriş</title>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f0f4ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; border-radius: 24px; padding: 48px 32px; text-align: center; max-width: 320px; box-shadow: 0 8px 32px rgba(30,64,175,0.12); }
    h1 { color: #1e40af; font-size: 22px; margin-bottom: 12px; }
    p { color: #64748b; font-size: 15px; line-height: 1.6; }
    button { margin-top: 24px; padding: 12px 28px; background: #1e40af; color: white; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:64px;margin-bottom:16px">📡</div>
    <h1>İnternet Bağlantısı Yok</h1>
    <p>Giriş-çıkış işlemi için internet bağlantısı gereklidir. Lütfen bağlantınızı kontrol edip tekrar deneyin.</p>
    <button onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
